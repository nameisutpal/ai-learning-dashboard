<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI Learning Dashboard — track courses, study time, and AI-assisted learning."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>AI Learning Dashboard</title>
    <!-- Theme bootstrap: must stay in sync with LS_KEYS.userPreferences + PreferencesContext theme rules. -->
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('ai-learn:user-preferences')
          var prefs = raw ? JSON.parse(raw) : {}
          var t = prefs.theme || 'dark'
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {
          document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = 'dark'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
